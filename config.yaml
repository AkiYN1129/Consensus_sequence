input:
  hit_table_files:
    - "HsKCNE1_TM_nr_blastp_HitTable.txt"
  fullseq_files:
    - "HsKCNE1_TM_nr_blastp_FullSeq.txt"

filters:
  numeric_conditions:
    - column: "identity"
      op: ">="
      value: 70
    - column: "positives"
      op: ">="
      value: 70

recname_filters:
  - keyword: "Kinase"
    match: "partial"
    case_sensitive: false
  - keyword: "ABC transporter"
    match: "exact"
    case_sensitive: false
  - keyword: "^ATP.*binding"
    match: "regex"
    case_sensitive: true
  # exclude: true を付けると一致した RecName を出力対象から除外します
  - keyword: "hypothetical protein"
    match: "partial"
    case_sensitive: false
    exclude: true

output:
  fasta_file: "filtered_sequences.fasta"
